<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Système d'interdépendances VELI — Xtrême Défi ADEME</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f9f8f4;
    color: #2c2c2a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 4px;
    color: #2c2c2a;
  }
  .subtitle {
    font-size: 13px;
    color: #73726c;
    margin-bottom: 24px;
  }
  .wrapper {
    width: 100%;
    max-width: 740px;
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.12);
    border-radius: 12px;
    padding: 24px;
  }
  svg { display: block; width: 100%; }
  #si {
    font-size: 13px;
    color: #5f5e5a;
    min-height: 52px;
    padding: 10px 4px 4px;
    line-height: 1.6;
    border-top: 0.5px solid rgba(0,0,0,0.1);
    margin-top: 4px;
  }
  .credit {
    margin-top: 16px;
    font-size: 11px;
    color: #b4b2a9;
    text-align: center;
  }
</style>
</head>
<body>
<h1>Système d'interdépendances des véhicules intermédiaires (VELI)</h1>
<p class="subtitle">Xtrême Défi ADEME — Séminaire Industrie — Groupe de travail mutualisation</p>

<div class="wrapper">
  <svg id="sd" viewBox="0 0 680 590" role="img">
    <title>Système d'interdépendances des VELI</title>
    <desc>Réseau de 9 concepts interdépendants autour du score environnemental comme pivot central : écoconception, souveraineté, composants mutualisés, aide à l'achat, modèle économique, véhicule économique, réparabilité, durabilité.</desc>
  </svg>
  <div id="si"></div>
</div>

<p class="credit">Survolez ou cliquez un concept pour explorer ses connexions et sa description.</p>

<script>
(function(){
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('sd');
  const info = document.getElementById('si');
  const W = 150, H = 50, hw = W/2, hh = H/2;

  const NODES = [
    {id:'score', lines:['Score','environnemental'], cx:340, cy:295, ramp:'purple'},
    {id:'eco',   lines:['Écoconception'],           cx:148, cy:140, ramp:'coral'},
    {id:'souv',  lines:['Souveraineté','& efficience'], cx:340, cy:82, ramp:'coral'},
    {id:'comp',  lines:['Composants','mutualisés'],  cx:530, cy:140, ramp:'teal'},
    {id:'aide',  lines:["Aide à l'achat"],           cx:537, cy:295, ramp:'amber'},
    {id:'modec', lines:['Modèle','économique'],      cx:507, cy:450, ramp:'blue'},
    {id:'veh',   lines:['Véhicule','économique'],    cx:340, cy:505, ramp:'amber'},
    {id:'rep',   lines:['Réparabilité','& SAV'],     cx:155, cy:450, ramp:'teal'},
    {id:'dur',   lines:['Durabilité'],               cx:143, cy:295, ramp:'green'},
  ];

  const EDGES = [
    {f:'eco',   t:'score', lbl:"Le design et les matériaux déterminent directement le score.", k:1},
    {f:'souv',  t:'score', lbl:"Moins de matériaux critiques et moins de dépendances logicielles améliorent le score.", k:1},
    {f:'comp',  t:'score', lbl:"Poids, dimensionnement et composants standardisés pèsent sur le score.", k:1},
    {f:'rep',   t:'score', lbl:"La réparabilité est un critère explicite du score environnemental.", k:1},
    {f:'dur',   t:'score', lbl:"La durée de vie longue (économie circulaire) améliore le score.", k:1},
    {f:'score', t:'aide',  lbl:"Le score module les aides à l'achat — les meilleurs véhicules reçoivent plus.", k:2},
    {f:'score', t:'modec', lbl:"Un bon score rassure les investisseurs et sécurise le modèle économique.", k:2},
    {f:'aide',  t:'veh',   lbl:"Les aides rendent le véhicule attractif et compétitif face à la voiture.", k:3},
    {f:'comp',  t:'veh',   lbl:"Les économies d'échelle sur les composants réduisent le prix du véhicule.", k:3},
    {f:'veh',   t:'modec', lbl:"Un véhicule économique et attractif génère du volume et structure la filière.", k:3},
    {f:'eco',   t:'comp',  lbl:"L'écoconception pousse à la standardisation des composants entre constructeurs.", k:4},
    {f:'rep',   t:'dur',   lbl:"La réparabilité prolonge la durée de vie et réduit l'empreinte matière.", k:4},
    {f:'eco',   t:'souv',  lbl:"Choisir des matériaux locaux et des assemblages simples renforce l'indépendance.", k:4},
  ];

  const DESCS = {
    score: "Le score environnemental est le <strong>sujet pivot</strong> : il traduit les choix de design, de matériaux, le dimensionnement des composants et la réparabilité. Il module ensuite les aides à l'achat et conditionne l'accès aux marchés et aux investisseurs.",
    eco:   "<strong>L'écoconception</strong> détermine le score directement : matériaux biosourcés (bambou, lin), légèreté (10× moins qu'une voiture), assemblages démontables et vissés, sans colles irréversibles.",
    souv:  "La <strong>souveraineté</strong> vise à réduire la dépendance aux matériaux critiques (lithium, terres rares), aux logiciels étrangers, en favorisant des filières locales et européennes non délocalisables.",
    comp:  "La <strong>mutualisation</strong> crée des économies d'échelle, établit des standards partagés (freins, batterie, éclairage, contrôleur moteur) entre constructeurs, et réduit le Coût de Revient Industriel.",
    aide:  "Les <strong>aides à l'achat</strong> (BPI, fonds vert) sont modulées selon le score : les véhicules les plus performants bénéficient d'aides supérieures. C'est un levier direct sur l'attractivité commerciale.",
    modec: "La structure juridique (<strong>SAEM, SCIC, SCOP</strong>) conditionne les équilibres public/privé, la capacité à lever des fonds pour industrialiser et gérer des flottes sur le long terme.",
    veh:   "Le <strong>prix du véhicule</strong> dépend du coût des composants, du design choisi et des aides. Son attractivité (B2C, B2B, flottes) est la clé pour couvrir les marchés et rassurer les investisseurs.",
    rep:   "La <strong>réparabilité</strong> est à la fois un critère du score ET un levier économique : elle réduit le coût d'exploitation, permet un réseau SAV distribué (FabLabs, vélocistes, garages solidaires).",
    dur:   "La <strong>durabilité</strong> et l'économie circulaire (reconditionner, réparer, réutiliser) allongent la durée de vie des véhicules et réduisent l'empreinte matière jusqu'à 10× par rapport à une voiture.",
  };

  const RAMPS = {
    purple: {f:'#CECBF6', s:'#534AB7', t:'#3C3489'},
    coral:  {f:'#F5C4B3', s:'#993C1D', t:'#712B13'},
    teal:   {f:'#9FE1CB', s:'#0F6E56', t:'#085041'},
    amber:  {f:'#FAC775', s:'#854F0B', t:'#633806'},
    blue:   {f:'#B5D4F4', s:'#185FA5', t:'#0C447C'},
    green:  {f:'#C0DD97', s:'#3B6D11', t:'#27500A'},
  };

  const KC = ['','#9F9BEA','#EF9F27','#378ADD','#5DC8A5'];
  const KL = ['','Alimente le score','Conséquence du score','Chaîne économique','Synergies de conception'];

  function el(tag, attrs, parent) {
    const e = document.createElementNS(ns, tag);
    if (attrs) for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, String(v));
    if (parent) parent.appendChild(e);
    return e;
  }

  // Defs & markers
  const defs = el('defs', {}, svg);
  for (let k = 1; k <= 4; k++) {
    const m = el('marker', {id:'am'+k, viewBox:'0 0 10 10', refX:8, refY:5, markerWidth:6, markerHeight:6, orient:'auto-start-reverse'}, defs);
    el('path', {d:'M2 1L8 5L2 9', fill:'none', stroke:KC[k], 'stroke-width':'1.5', 'stroke-linecap':'round', 'stroke-linejoin':'round'}, m);
  }

  // Get rect border point toward (tx,ty) from center (cx,cy)
  function edgePt(cx, cy, tx, ty) {
    const dx = tx-cx, dy = ty-cy;
    if (!dx && !dy) return [cx, cy];
    const sx = dx !== 0 ? hw/Math.abs(dx) : 1e9;
    const sy = dy !== 0 ? hh/Math.abs(dy) : 1e9;
    const s = Math.min(sx, sy);
    return [+(cx+dx*s).toFixed(1), +(cy+dy*s).toFixed(1)];
  }

  function getN(id) { return NODES.find(n => n.id === id); }

  // Legend
  const ly = 565;
  [{k:1,x:18},{k:2,x:188},{k:3,x:365},{k:4,x:515}].forEach(({k,x}) => {
    el('circle', {cx:x+7, cy:ly, r:5, fill:KC[k]}, svg);
    const t = el('text', {x:x+18, y:ly, 'dominant-baseline':'central', 'font-size':'11', 'font-family':'system-ui,sans-serif', fill:'#888780'}, svg);
    t.textContent = KL[k];
  });

  // Edges
  const EEL = [];
  EDGES.forEach((e, i) => {
    const fn = getN(e.f), tn = getN(e.t);
    const [x1,y1] = edgePt(fn.cx, fn.cy, tn.cx, tn.cy);
    const [x2,y2] = edgePt(tn.cx, tn.cy, fn.cx, fn.cy);
    let d;
    if (e.k === 4) {
      const mx=(x1+x2)/2, my=(y1+y2)/2;
      const dx=x2-x1, dy=y2-y1;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      let nx=-dy/len*38, ny=dx/len*38;
      if ((mx+nx-340)**2+(my+ny-295)**2 < (mx-340)**2+(my-295)**2) { nx=-nx; ny=-ny; }
      d = `M${x1},${y1} Q${+(mx+nx).toFixed(1)},${+(my+ny).toFixed(1)} ${x2},${y2}`;
    } else {
      d = `M${x1},${y1} L${x2},${y2}`;
    }
    const g = el('g', {}, svg);
    const path = el('path', {d, fill:'none', stroke:KC[e.k], 'stroke-width':'1', 'stroke-opacity':'0.3', 'marker-end':`url(#am${e.k})`}, g);
    const hit = el('path', {d, fill:'none', stroke:'transparent', 'stroke-width':'14'}, g);
    EEL.push({g, path, e});
    hit.style.cursor = 'default';
    hit.addEventListener('mouseenter', () => {
      if (!activeNode) {
        path.setAttribute('stroke-opacity','0.85');
        path.setAttribute('stroke-width','2.5');
        info.innerHTML = `<span style="color:${KC[e.k]};font-weight:600">${KL[e.k]}</span> — <em>${getN(e.f).lines.join(' ')} → ${getN(e.t).lines.join(' ')}</em> : ${e.lbl}`;
      }
    });
    hit.addEventListener('mouseleave', () => {
      if (!activeNode) {
        path.setAttribute('stroke-opacity','0.3');
        path.setAttribute('stroke-width','1');
        info.innerHTML = hint;
      }
    });
  });

  // Nodes
  const NEL = {};
  NODES.forEach(n => {
    const c = RAMPS[n.ramp];
    const isc = n.id === 'score';
    const g = el('g', {}, svg);
    g.style.cursor = 'pointer';
    if (isc) {
      el('rect', {x:n.cx-hw-5, y:n.cy-hh-5, width:W+10, height:H+10, rx:15, fill:'none', stroke:c.f, 'stroke-width':'2.5', 'stroke-opacity':'0.7'}, g);
    }
    const rect = el('rect', {x:n.cx-hw, y:n.cy-hh, width:W, height:H, rx:isc?10:8, fill:c.f, stroke:c.s, 'stroke-width':isc?'2':'0.5'}, g);
    const tl=n.lines.length, lh=16, sy=n.cy-(tl-1)*lh/2;
    n.lines.forEach((line, li) => {
      const t = el('text', {x:n.cx, y:sy+li*lh, 'text-anchor':'middle', 'dominant-baseline':'central', 'font-size':'13', 'font-weight':'500', 'font-family':'system-ui,sans-serif', fill:c.t}, g);
      t.textContent = line;
    });
    NEL[n.id] = {g, rect, n};
    g.addEventListener('click', ev => { ev.stopPropagation(); toggleActive(n.id); });
    g.addEventListener('mouseenter', () => { if (!activeNode) { doHL(n.id); info.innerHTML = DESCS[n.id]; } });
    g.addEventListener('mouseleave', () => { if (!activeNode) { clearHL(); info.innerHTML = hint; } });
  });

  let activeNode = null;
  const hint = '<span style="opacity:0.6">Survolez ou cliquez un concept pour explorer ses connexions et sa description.</span>';
  info.innerHTML = hint;

  function connected(id) {
    const s = new Set([id]);
    EDGES.forEach(e => { if (e.f===id||e.t===id) { s.add(e.f); s.add(e.t); } });
    return s;
  }

  function doHL(id) {
    const conn = connected(id);
    Object.values(NEL).forEach(({rect,n}) => {
      const a = conn.has(n.id);
      rect.setAttribute('fill-opacity', a?'1':'0.3');
      rect.setAttribute('stroke-opacity', a?'1':'0.2');
    });
    EEL.forEach(({path,e}) => {
      const r = conn.has(e.f)&&conn.has(e.t);
      path.setAttribute('stroke-opacity', r?'0.85':'0.06');
      path.setAttribute('stroke-width', r?'2.5':'0.5');
    });
  }

  function clearHL() {
    Object.values(NEL).forEach(({rect}) => {
      rect.setAttribute('fill-opacity','1');
      rect.setAttribute('stroke-opacity','1');
    });
    EEL.forEach(({path}) => {
      path.setAttribute('stroke-opacity','0.3');
      path.setAttribute('stroke-width','1');
    });
  }

  function toggleActive(id) {
    if (activeNode === id) { activeNode=null; clearHL(); info.innerHTML=hint; return; }
    activeNode = id;
    doHL(id);
    info.innerHTML = DESCS[id];
  }

  svg.addEventListener('click', () => { activeNode=null; clearHL(); info.innerHTML=hint; });
})();
</script>
</body>
</html>
